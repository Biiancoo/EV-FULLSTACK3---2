server:
  port: 8085

spring:
  application:
    name: chatbot-service

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:SmartLogixSuperSecretKeyForJWT2024PlatformMicroservicesArchitecture!!}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    model: llama-3.1-8b-instant
    enabled: ${GEMINI_ENABLED:true}

logging:
  level:
    com.smartlogix.chatbot: DEBUG
    org.springframework.web.client: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

services:
  gateway: ${API_GATEWAY_URL:http://localhost:8080}
